services:
  db:
    image: postgres:15
    container_name: cyna-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./config/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  pipeline:
    build: .
    container_name: cyna-pipeline
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      IPSUM_PATH: /app/ipsum/ipsum.txt
      LOG_DIR: /app/logs
      GENERATOR_DIR: /app/generator
    volumes:
      - ./src:/app/src
      - ./scripts:/app/scripts
      - ./logs:/app/logs
      - ../ipsum:/app/ipsum:ro
      - ../Security-Log-Generator:/app/generator
    command: bash scripts/run_pipeline.sh

  api:
    build: ./api
    container_name: cyna-api
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      IPSUM_PATH: /app/ipsum/ipsum.txt
      LOG_DIR: /app/logs
      GENERATOR_DIR: /app/generator
    volumes:
      - ./scripts:/app/scripts
      - ./src:/app/src
      - ./logs:/app/logs
      - ../ipsum:/app/ipsum:ro
      - ../Security-Log-Generator:/app/generator
    ports:
      - "8000:8000"
    command: uvicorn main:app --host 0.0.0.0 --port 8000

  frontend:
    build: ./frontend
    container_name: cyna-frontend
    depends_on:
      - api
    ports:
      - "3000:80"
    environment:
      VITE_API_URL: http://localhost:8000

volumes:
  pgdata:
